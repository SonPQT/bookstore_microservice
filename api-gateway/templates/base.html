<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BookStore Microservice Gateway</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; }
    nav a { margin-right: 16px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; vertical-align: top; }
    form { margin-top: 16px; margin-bottom: 24px; }
    input, select, textarea { margin: 4px 0; padding: 6px; width: 320px; max-width: 100%; }
    textarea { min-height: 90px; }
    button { padding: 8px 12px; }
    .box { border: 1px solid #ddd; padding: 16px; margin-bottom: 20px; }
    .code { background: #f5f5f5; padding: 8px; display: inline-block; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>BookStore Microservice Gateway</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/books/">Manage Books</a>
    <a href="/catalog/">Catalog</a>
    <a href="/customers/">Customers</a>
    <a href="/dashboard/">Dashboard</a>
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
