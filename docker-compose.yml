services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
    - 5432:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5
  customer-service:
    build: ./customer-service
    container_name: customer-service
    volumes:
      - ./customer-service:/app
    environment:
      CART_SERVICE_URL: http://cart-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: customer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8001:8000
    depends_on:
      cart-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  book-service:
    build: ./book-service
    container_name: book-service
    volumes:
      - ./book-service:/app
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: book_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8002:8000
    depends_on:
      postgres-db:
        condition: service_healthy
  cart-service:
    build: ./cart-service
    container_name: cart-service
    volumes:
      - ./cart-service:/app
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8003:8000
    depends_on:
      book-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  staff-service:
    build: ./staff-service
    container_name: staff-service
    volumes:
      - ./staff-service:/app
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: staff_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8004:8000
    depends_on:
      book-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  manager-service:
    build: ./manager-service
    container_name: manager-service
    volumes:
      - ./manager-service:/app
    environment:
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      BOOK_SERVICE_URL: http://book-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      STAFF_SERVICE_URL: http://staff-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      PAY_SERVICE_URL: http://pay-service:8000
      SHIP_SERVICE_URL: http://ship-service:8000
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8000
      RECOMMENDER_SERVICE_URL: http://recommender-ai-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: manager_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8005:8000
    depends_on:
      customer-service:
        condition: service_started
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      staff-service:
        condition: service_started
      order-service:
        condition: service_started
      catalog-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      recommender-ai-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  order-service:
    build: ./order-service
    container_name: order-service
    volumes:
      - ./order-service:/app
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      PAY_SERVICE_URL: http://pay-service:8000
      SHIP_SERVICE_URL: http://ship-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8006:8000
    depends_on:
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    volumes:
      - ./catalog-service:/app
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8007:8000
    depends_on:
      book-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  pay-service:
    build: ./pay-service
    container_name: pay-service
    volumes:
      - ./pay-service:/app
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: pay_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8008:8000
    depends_on:
      postgres-db:
        condition: service_healthy
  ship-service:
    build: ./ship-service
    container_name: ship-service
    volumes:
      - ./ship-service:/app
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: ship_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8009:8000
    depends_on:
      postgres-db:
        condition: service_healthy
  comment-rate-service:
    build: ./comment-rate-service
    container_name: comment-rate-service
    volumes:
      - ./comment-rate-service:/app
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: comment_rate_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8010:8000
    depends_on:
      book-service:
        condition: service_started
      customer-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  recommender-ai-service:
    build: ./recommender-ai-service
    container_name: recommender-ai-service
    volumes:
      - ./recommender-ai-service:/app
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: recommender_ai_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8011:8000
    depends_on:
      book-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      BOOK_SERVICE_URL: http://book-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      STAFF_SERVICE_URL: http://staff-service:8000
      MANAGER_SERVICE_URL: http://manager-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8000
      RECOMMENDER_SERVICE_URL: http://recommender-ai-service:8000
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: api_gateway_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
    - 8000:8000
    depends_on:
      customer-service:
        condition: service_started
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      staff-service:
        condition: service_started
      manager-service:
        condition: service_started
      order-service:
        condition: service_started
      catalog-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      recommender-ai-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    ports:
      - "8080:8080"
    volumes:
      - ./api-specs:/usr/share/nginx/html/api-specs
    environment:
      SWAGGER_JSON: /usr/share/nginx/html/api-specs/service-a.yaml
volumes:
  postgres-data: null
